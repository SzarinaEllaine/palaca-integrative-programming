<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings – Monellaine</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="site-header">
      <a class="logo-link" href="profile.html">
        <img src="assets/monellaine.png" class="site-logo" alt="Logo" />
      </a>

      <nav class="site-nav">
        <ul>
          <li><a href="profile.html">Back to Profile</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="panel">
        <div class="container" style="max-width: 600px">
          <div class="card" style="padding: 2rem">
            <div style="text-align: center; margin-bottom: 2rem">
              <h2 class="brand">Account Settings</h2>
              <p class="muted">Update your preferences and security details.</p>
            </div>

            <form class="auth-form" id="settingsForm">
              <div class="form-group">
                <label>Change Email</label>
                <input type="email" id="settingsEmail" />
                <small class="error"></small>
              </div>

              <div class="form-group">
                <label>Change Address</label>
                <input type="text" id="settingsAddress" />
                <small class="error"></small>
              </div>

              <div class="form-group">
                <label>Change Password</label>
                <input
                  type="password"
                  id="settingsPassword"
                  placeholder="Leave blank to keep current password"
                />
                <small class="error"></small>
              </div>

              <div class="form-group">
                <label>Theme Preference</label>
                <select class="form-select" id="themeSelect">
                  <option value="light">Light (Cream & Gold)</option>
                  <option value="dark">Dark (Coffee & Bronze)</option>
                </select>
              </div>

              <div style="margin-top: 1.5rem; text-align: right">
                <button class="btn btn-primary" type="submit">
                  Save Changes
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
