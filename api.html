<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Monellaine Pâtisserie | Dessert API</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #fff7f9;
      }

      .api-section {
        padding: 80px 20px;
        text-align: center;
      }

      .brand {
        font-family: "Dancing Script", cursive;
        font-size: 42px;
        color: #d46a92;
      }

      .muted {
        color: #777;
        margin-bottom: 15px;
      }

      .api-box {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .api-box input {
        padding: 12px;
        width: 260px;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        transition: 0.2s;
      }

      .api-box input:focus {
        border-color: #ff9bb3;
        box-shadow: 0 0 5px rgba(255, 155, 179, 0.5);
      }

      .btn-primary {
        padding: 12px 16px;
        background: linear-gradient(135deg, #ff9bb3, #ff6f91);
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.2s;
      }

      .btn-primary:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }

      .api-results {
        margin-top: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
      }

      .api-card {
        background: white;
        padding: 18px;
        border-radius: 14px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s;
      }

      .api-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.12);
      }

      .api-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .api-card h3 {
        margin: 10px 0 5px;
        color: #333;
      }

      .api-card p {
        font-size: 14px;
        color: #666;
        margin: 5px 0;
      }

      .save-btn {
        margin-top: 10px;
        padding: 8px 12px;
        background: #ffd1dc;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
      }

      .save-btn:hover {
        background: #ff9bb3;
        color: white;
      }

      .message {
        margin-top: 20px;
        font-weight: 500;
        color: #d46a92;
      }

      .site-nav a:hover {
        color: #ff6f91;
      }
    </style>
  </head>

  <body>
    <header class="site-header">
      <a class="logo-link" href="index.html">
        <img src="assets/monellaine.png" alt="logo" class="site-logo" />
      </a>

      <nav class="site-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#menu">Menu</a></li>
          <li><a href="api.html">API</a></li>
          <li><a href="saved.html">Saved</a></li>
          <li><a href="logout.html">Logout</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="api-section">
        <h1 class="brand">🍰 Dessert Search API</h1>

        <p class="muted">
          Discover delicious desserts and save your favorites!
        </p>

        <label for="dessertInput"><strong>Dessert Name:</strong></label>

        <div class="api-box">
          <input
            type="text"
            id="dessertInput"
            placeholder="Example: cake, tart, cookie"
          />

          <button class="btn btn-primary" onclick="searchDessert()">
            Search
          </button>
        </div>

        <div id="message" class="message"></div>
        <div id="apiResults" class="api-results"></div>
      </section>
    </main>

    <script>
      function searchDessert() {
        const query = document.getElementById("dessertInput").value.trim();
        const resultsContainer = document.getElementById("apiResults");
        const message = document.getElementById("message");

        resultsContainer.innerHTML = "";
        message.textContent = "";

        if (query === "") {
          message.textContent = "Please enter a dessert name.";
          return;
        }

        fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`)
          .then((response) => {
            if (!response.ok) {
              throw new Error("API request failed.");
            }
            return response.json();
          })
          .then((data) => {
            if (!data.meals) {
              message.textContent = "No desserts found for your search.";
              return;
            }

            data.meals.forEach((meal) => {
              const card = document.createElement("div");
              card.classList.add("api-card");

              card.innerHTML = `
                <h3>${meal.strMeal}</h3>
                <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
                <p><strong>Category:</strong> ${meal.strCategory}</p>
                <p><strong>Origin:</strong> ${meal.strArea}</p>
                <p>${meal.strInstructions.substring(0, 120)}...</p>

                <button class="save-btn" onclick='saveMeal(${JSON.stringify(meal)})'>
                  💾 Save
                </button>
              `;

              resultsContainer.appendChild(card);
            });
          })
          .catch((error) => {
            message.textContent =
              "Failed to retrieve data from the API. Please try again.";
            console.error(error);
          });
      }

      function saveMeal(meal) {
        let savedMeals = JSON.parse(localStorage.getItem("savedMeals")) || [];

        const exists = savedMeals.some((item) => item.name === meal.strMeal);

        if (exists) {
          alert("Already saved!");
          return;
        }

        const mealData = {
          name: meal.strMeal,
          category: meal.strCategory,
          image: meal.strMealThumb,
          area: meal.strArea,
        };

        savedMeals.push(mealData);

        localStorage.setItem("savedMeals", JSON.stringify(savedMeals));

        alert("Saved successfully!");
      }
    </script>
  </body>
</html>
